name: Release Assets

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            archive_ext: zip
            setup_mingw: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup MinGW
        if: matrix.setup_mingw
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain

      - name: Add MinGW to PATH
        if: matrix.setup_mingw
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${GITHUB_REF_NAME}"
          asset_base="cnb-${release_tag}-${{ matrix.target }}"
          asset_dir="${asset_base}"

          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            binary_name="cnb.exe"
            git_cnb_name="git-cnb.exe"
          else
            binary_name="cnb"
            git_cnb_name="git-cnb"
          fi

          mkdir -p "${asset_dir}"
          cp "target/${{ matrix.target }}/release/${binary_name}" "${asset_dir}/"
          cp "target/${{ matrix.target }}/release/${git_cnb_name}" "${asset_dir}/"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a "${asset_base}.zip" "${asset_dir}"
            asset_file="${asset_base}.zip"
          else
            tar czf "${asset_base}.tar.gz" "${asset_dir}"
            asset_file="${asset_base}.tar.gz"
          fi

          echo "asset_file=${asset_file}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package.outputs.asset_file }}
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish GitHub and CNB releases
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CNB_API_ENDPOINT: https://api.cnb.cool
      CNB_WEB_ENDPOINT: https://cnb.cool
      CNB_REPO_SLUG: wwvo/cnb-cli/cnb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate CNB upload secret
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail
          : "${CNB_TOKEN:?Missing GitHub secret CNB_TOKEN}"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          set -euo pipefail
          git fetch --tags --force
          git cliff --latest --strip header -o LATEST_CHANGELOG.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          body_path: LATEST_CHANGELOG.md
          overwrite_files: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

      - name: Collect CNB attachment files
        id: attachments
        run: |
          set -euo pipefail

          files="$(find release-artifacts -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) | sort | paste -sd, -)"
          : "${files:?No release artifacts found for CNB upload}"
          echo "files=${files}" >> "$GITHUB_OUTPUT"

      - name: Delete existing CNB release attachments
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          log_file="$(mktemp)"

          set +e
          docker run --rm \
            -e TZ=Asia/Shanghai \
            -e CNB_TOKEN="${CNB_TOKEN}" \
            -e CNB_API_ENDPOINT="${CNB_API_ENDPOINT}" \
            -e CNB_WEB_ENDPOINT="${CNB_WEB_ENDPOINT}" \
            -e CNB_REPO_SLUG="${CNB_REPO_SLUG}" \
            -e PLUGIN_TAG="${GITHUB_REF_NAME}" \
            -e PLUGIN_TYPE="DELETE" \
            -v "${PWD}:${PWD}" \
            -w "${PWD}" \
            cnbcool/attachments:latest 2>&1 | tee "${log_file}"
          status="${PIPESTATUS[0]}"
          set -e

          if [[ "${status}" -eq 0 ]]; then
            exit 0
          fi

          if grep -Eq "附件不存在|attachment.*not.*exist|attachments?.*not.*found" "${log_file}"; then
            echo "CNB release 当前没有附件，跳过删除"
            exit 0
          fi

          echo "删除 CNB release 附件失败" >&2
          exit "${status}"

      - name: Upload attachments to CNB Release
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail

          docker run --rm \
            -e TZ=Asia/Shanghai \
            -e CNB_TOKEN="${CNB_TOKEN}" \
            -e CNB_API_ENDPOINT="${CNB_API_ENDPOINT}" \
            -e CNB_WEB_ENDPOINT="${CNB_WEB_ENDPOINT}" \
            -e CNB_REPO_SLUG="${CNB_REPO_SLUG}" \
            -e PLUGIN_TAG="${GITHUB_REF_NAME}" \
            -e PLUGIN_ATTACHMENTS="${{ steps.attachments.outputs.files }}" \
            -v "${PWD}:${PWD}" \
            -w "${PWD}" \
            cnbcool/attachments:latest
