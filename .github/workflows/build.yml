name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            package_linux_deb: true
            package_linux_rpm: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: true
            package_linux_deb: true
            package_linux_rpm: true
            linux_deb_arch: arm64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            archive_ext: zip
            setup_mingw: true
            package_windows_msi: true
            windows_msi_arch: x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            package_windows_msi: true
            windows_msi_arch: x64
            msvc_dev_cmd_arch: amd64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            package_windows_msi: true
            windows_msi_arch: arm64
            msvc_dev_cmd_arch: amd64_arm64
          - os: ubuntu-latest
            target: aarch64-pc-windows-gnullvm
            archive_ext: zip
            setup_cross_toolchain: true
            experimental: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup MinGW
        if: matrix.setup_mingw
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain

      - name: Add MinGW to PATH
        if: matrix.setup_mingw
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install Linux native packaging dependencies
        if: matrix.package_linux_deb || matrix.package_linux_rpm
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm

          if [[ -n "${{ matrix.linux_deb_arch }}" ]]; then
            # crossbuild-essential-arm64 is an Architecture: all metapackage.
            # Installing it does not require enabling arm64 apt indexes on the runner,
            # which currently causes 404s against Ubuntu security mirrors.
            sudo apt-get install -y "crossbuild-essential-${{ matrix.linux_deb_arch }}"
          fi

      - name: Install cargo-deb
        if: matrix.package_linux_deb
        shell: bash
        run: cargo install cargo-deb --locked

      - name: Install cargo-generate-rpm
        if: matrix.package_linux_rpm
        shell: bash
        run: cargo install cargo-generate-rpm --locked

      - name: Setup Windows ARM64 gnullvm toolchain
        if: matrix.setup_cross_toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Setup .NET SDK
        if: matrix.package_windows_msi
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSVC developer command prompt
        if: endsWith(matrix.target, '-pc-windows-msvc')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_dev_cmd_arch }}

      - name: Build binaries (Windows MSVC)
        if: endsWith(matrix.target, '-pc-windows-msvc')
        shell: pwsh
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Build binaries
        if: ${{ !endsWith(matrix.target, '-pc-windows-msvc') }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.setup_cross_toolchain }}" == "true" ]]; then
            cargo build --release --locked --target "${{ matrix.target }}"
          elif [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Build Windows MSI package
        if: matrix.package_windows_msi
        shell: pwsh
        run: |
          .\packaging\windows\scripts\build-msi.ps1 `
            -Target ${{ matrix.target }} `
            -Architecture ${{ matrix.windows_msi_arch }} `
            -OutputDir target\windows-msi

      - name: Build Linux packaging helper binary
        if: matrix.package_linux_deb || matrix.package_linux_rpm
        shell: bash
        run: |
          set -euo pipefail

          host_target="$(rustc -vV | sed -n 's/^host: //p')"
          if [[ "${{ matrix.target }}" == "${host_target}" ]]; then
            exit 0
          fi

          cargo build --release --locked --bin cnb-rs --target "${host_target}" --target-dir target/packaging-host

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${GITHUB_REF_NAME}"
          asset_base="cnb-rs-${release_tag}-${{ matrix.target }}"
          asset_dir="${asset_base}"
          archive_file=""
          msi_file=""
          deb_file=""
          rpm_file=""

          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            binary_name="cnb-rs.exe"
          else
            binary_name="cnb-rs"
          fi

          mkdir -p "${asset_dir}"
          cp "target/${{ matrix.target }}/release/${binary_name}" "${asset_dir}/"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a -tzip -mx=9 "${asset_base}.zip" "${asset_dir}"
            archive_file="${asset_base}.zip"
          else
            archive_file="${asset_base}.tar.gz"
            tar cf - "${asset_dir}" | gzip -9 > "${archive_file}"
          fi

          if [[ "${{ matrix.package_windows_msi }}" == "true" ]]; then
            generated_msi_file="$(find target/windows-msi -maxdepth 1 -type f -name "*-${{ matrix.target }}.msi" | sort | head -n 1)"
            : "${generated_msi_file:?failed to locate generated MSI file}"
            cp "${generated_msi_file}" .
            msi_file="$(basename "${generated_msi_file}")"
          fi

          if [[ "${{ matrix.package_linux_deb }}" == "true" || "${{ matrix.package_linux_rpm }}" == "true" ]]; then
            host_target="$(rustc -vV | sed -n 's/^host: //p')"
            completion_binary_path="target/${{ matrix.target }}/release/cnb-rs"
            if [[ "${{ matrix.target }}" != "${host_target}" ]]; then
              completion_binary_path="target/packaging-host/${host_target}/release/cnb-rs"
            fi

            bash packaging/linux/scripts/generate-completions.sh --binary-path "${completion_binary_path}"
          fi

          if [[ "${{ matrix.package_linux_deb }}" == "true" ]]; then
            cargo deb --no-build --no-strip --target "${{ matrix.target }}"
            generated_deb_file=""
            for candidate_dir in "target/${{ matrix.target }}/debian" "target/debian"; do
              if [[ -d "${candidate_dir}" ]]; then
                generated_deb_file="$(find "${candidate_dir}" -maxdepth 1 -type f -name '*.deb' | head -n 1)"
              fi
              if [[ -n "${generated_deb_file}" ]]; then
                break
              fi
            done
            : "${generated_deb_file:?failed to locate generated deb file}"
            cp "${generated_deb_file}" .
            deb_file="$(basename "${generated_deb_file}")"
          fi

          if [[ "${{ matrix.package_linux_rpm }}" == "true" ]]; then
            cargo generate-rpm --target "${{ matrix.target }}"
            generated_rpm_file=""
            for candidate_dir in "target/${{ matrix.target }}/generate-rpm" "target/generate-rpm"; do
              if [[ -d "${candidate_dir}" ]]; then
                generated_rpm_file="$(find "${candidate_dir}" -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
              fi
              if [[ -n "${generated_rpm_file}" ]]; then
                break
              fi
            done
            : "${generated_rpm_file:?failed to locate generated rpm file}"
            cp "${generated_rpm_file}" .
            rpm_file="$(basename "${generated_rpm_file}")"
          fi

          printf 'archive_file=%s\n' "${archive_file}" >> "$GITHUB_OUTPUT"
          printf 'archive_name=%s\n' "${archive_file}" >> "$GITHUB_OUTPUT"
          printf 'msi_file=%s\n' "${msi_file}" >> "$GITHUB_OUTPUT"
          printf 'msi_name=%s\n' "${msi_file}" >> "$GITHUB_OUTPUT"
          printf 'deb_file=%s\n' "${deb_file}" >> "$GITHUB_OUTPUT"
          printf 'deb_name=%s\n' "${deb_file}" >> "$GITHUB_OUTPUT"
          printf 'rpm_file=%s\n' "${rpm_file}" >> "$GITHUB_OUTPUT"
          printf 'rpm_name=%s\n' "${rpm_file}" >> "$GITHUB_OUTPUT"

      - name: Validate Linux native packages
        if: matrix.package_linux_deb || matrix.package_linux_rpm
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)
              expected_rpm_arch="x86_64"
              expected_deb_arch="amd64"
              ;;
            aarch64-unknown-linux-gnu)
              expected_rpm_arch="aarch64"
              expected_deb_arch="arm64"
              ;;
            *)
              echo "Unsupported Linux packaging validation target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

          expected_paths=(
            "/usr/bin/cnb-rs"
            "/usr/share/bash-completion/completions/cnb-rs"
            "/usr/share/zsh/vendor-completions/_cnb-rs"
            "/usr/share/fish/vendor_completions.d/cnb-rs.fish"
          )

          if [[ "${{ matrix.package_linux_deb }}" == "true" ]]; then
            deb_file="$(find . -maxdepth 1 -type f -name '*.deb' | head -n 1)"
            : "${deb_file:?failed to locate copied deb file for validation}"

            actual_deb_arch="$(dpkg-deb -f "${deb_file}" Architecture)"
            [[ "${actual_deb_arch}" == "${expected_deb_arch}" ]]

            dpkg-deb --contents "${deb_file}" | awk '{print $NF}' > deb-contents.txt
            for expected_path in "${expected_paths[@]}"; do
              grep -Fx ".${expected_path}" deb-contents.txt > /dev/null
            done
          fi

          if [[ "${{ matrix.package_linux_rpm }}" == "true" ]]; then
            rpm_file="$(find . -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
            : "${rpm_file:?failed to locate copied rpm file for validation}"

            actual_rpm_arch="$(rpm -qp --qf '%{ARCH}\n' "${rpm_file}")"
            [[ "${actual_rpm_arch}" == "${expected_rpm_arch}" ]]

            rpm -qpl "${rpm_file}" > rpm-contents.txt
            for expected_path in "${expected_paths[@]}"; do
              grep -Fx "${expected_path}" rpm-contents.txt > /dev/null
            done
          fi

      - name: Upload build archive artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_file }}
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

      - name: Upload Windows MSIX input artifact
        if: ${{ matrix.target == 'x86_64-pc-windows-msvc' || matrix.target == 'aarch64-pc-windows-msvc' }}
        uses: actions/upload-artifact@v6
        with:
          name: windows-msix-input-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/cnb-rs.exe
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

      - name: Upload Windows MSI artifact
        if: ${{ steps.package.outputs.msi_file != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.msi_name }}
          path: ${{ steps.package.outputs.msi_file }}
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

      - name: Upload Linux DEB artifact
        if: ${{ steps.package.outputs.deb_file != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.deb_name }}
          path: ${{ steps.package.outputs.deb_file }}
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

      - name: Upload Linux RPM artifact
        if: ${{ steps.package.outputs.rpm_file != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.rpm_name }}
          path: ${{ steps.package.outputs.rpm_file }}
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

  build-msix:
    name: Build Windows MSIX/MSIXBUNDLE
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: windows-latest
    outputs:
      msix_enabled: ${{ steps.signing_mode.outputs.enabled }}
      release_version: ${{ steps.metadata.outputs.release_version }}
      msix_version: ${{ steps.metadata.outputs.msix_version }}
    env:
      WINDOWS_MSIX_PFX_BASE64: ${{ secrets.WINDOWS_MSIX_PFX_BASE64 }}
      WINDOWS_MSIX_PFX_PASSWORD: ${{ secrets.WINDOWS_MSIX_PFX_PASSWORD }}
      WINDOWS_MSIX_IDENTITY_NAME: ${{ vars.WINDOWS_MSIX_IDENTITY_NAME }}
      WINDOWS_MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.WINDOWS_MSIX_PUBLISHER_DISPLAY_NAME }}
      WINDOWS_MSIX_DISPLAY_NAME: ${{ vars.WINDOWS_MSIX_DISPLAY_NAME }}
      WINDOWS_MSIX_DESCRIPTION: ${{ vars.WINDOWS_MSIX_DESCRIPTION }}
      WINDOWS_MSIX_EXECUTION_ALIAS: ${{ vars.WINDOWS_MSIX_EXECUTION_ALIAS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve MSIX signing mode
        id: signing_mode
        shell: pwsh
        run: |
          $hasPfx = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_PFX_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_PFX_PASSWORD)

          if ($hasPfx -and $hasPassword) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "MSIX signing secrets detected; Windows MSIX/MSIXBUNDLE build is enabled."
            exit 0
          }

          if (-not $hasPfx -and -not $hasPassword) {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Warning "GitHub secrets WINDOWS_MSIX_PFX_BASE64 and WINDOWS_MSIX_PFX_PASSWORD are not configured; skipping Windows MSIX/MSIXBUNDLE build."
            exit 0
          }

          throw "Incomplete MSIX signing configuration: WINDOWS_MSIX_PFX_BASE64 and WINDOWS_MSIX_PFX_PASSWORD must either both be configured or both be absent"

      - name: Setup Rust toolchain
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msix-release

      - name: Setup .NET SDK
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Resolve MSIX release metadata
        id: metadata
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        shell: pwsh
        run: |
          $manifest = Get-Content Cargo.toml -Raw
          $match = [regex]::Match($manifest, '(?m)^\s*version\s*=\s*"(?<version>\d+\.\d+\.\d+(?:[-+][^"]+)?)"\s*$')
          if (-not $match.Success) {
            throw "Failed to detect workspace version from Cargo.toml"
          }

          $releaseVersion = $match.Groups["version"].Value
          $semverMatch = [regex]::Match($releaseVersion, '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)')
          if (-not $semverMatch.Success) {
            throw "Unsupported workspace version for MSIX packaging: $releaseVersion"
          }

          $msixVersion = "{0}.{1}.{2}.0" -f `
            $semverMatch.Groups["major"].Value, `
            $semverMatch.Groups["minor"].Value, `
            $semverMatch.Groups["patch"].Value

          $identityName = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_IDENTITY_NAME)) { "wwvo.cnb-rs" } else { $env:WINDOWS_MSIX_IDENTITY_NAME }
          $publisherDisplayName = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_PUBLISHER_DISPLAY_NAME)) { "wwvo" } else { $env:WINDOWS_MSIX_PUBLISHER_DISPLAY_NAME }
          $displayName = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_DISPLAY_NAME)) { "cnb-rs" } else { $env:WINDOWS_MSIX_DISPLAY_NAME }
          $description = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_DESCRIPTION)) { "Unofficial CNB command-line tool built with Rust" } else { $env:WINDOWS_MSIX_DESCRIPTION }
          $executionAlias = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_MSIX_EXECUTION_ALIAS)) { "cnb-rs.exe" } else { $env:WINDOWS_MSIX_EXECUTION_ALIAS }

          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "msix_version=$msixVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "identity_name=$identityName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "publisher_display_name=$publisherDisplayName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "display_name=$displayName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "description=$description" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "execution_alias=$executionAlias" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download x64 MSIX input artifact
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: windows-msix-input-x86_64-pc-windows-msvc
          path: target/windows-msix/input/x64

      - name: Download arm64 MSIX input artifact
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: windows-msix-input-aarch64-pc-windows-msvc
          path: target/windows-msix/input/arm64

      - name: Install msixbundle-cli
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        shell: pwsh
        run: cargo install msixbundle-cli --locked --version 1.1.4 --root target/tools/msixbundle-cli

      - name: Materialize signing certificate
        id: certificate
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        shell: pwsh
        run: |
          $certDir = Join-Path $PWD "target/windows-msix/cert"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null

          $pfxPath = Join-Path $certDir "release-signing.pfx"
          $certificateAssetName = "cnb-rs-v${{ steps.metadata.outputs.release_version }}-windows-msvc-signing-cert.cer"
          $certificatePath = Join-Path $certDir $certificateAssetName
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WINDOWS_MSIX_PFX_BASE64))

          $password = ConvertTo-SecureString -String $env:WINDOWS_MSIX_PFX_PASSWORD -AsPlainText -Force
          $certificate = Get-PfxCertificate -FilePath $pfxPath -Password $password
          if (-not $certificate) {
            throw "Failed to read signing certificate from PFX"
          }

          [System.IO.File]::WriteAllBytes(
            $certificatePath,
            $certificate.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert)
          )

          $publisher = $certificate.Subject
          if ([string]::IsNullOrWhiteSpace($publisher)) {
            throw "Failed to resolve certificate subject for MSIX Publisher"
          }

          "pfx_path=$pfxPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "certificate_path=$certificatePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "publisher=$publisher" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stage MSIX package contents
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        shell: pwsh
        run: |
          .\packaging\windows\scripts\stage-msix-content.ps1 `
            -X64BinaryPath target\windows-msix\input\x64\cnb-rs.exe `
            -Arm64BinaryPath target\windows-msix\input\arm64\cnb-rs.exe `
            -OutputDir target\windows-msix\appxcontent `
            -IdentityName "${{ steps.metadata.outputs.identity_name }}" `
            -Publisher "${{ steps.certificate.outputs.publisher }}" `
            -PublisherDisplayName "${{ steps.metadata.outputs.publisher_display_name }}" `
            -DisplayName "${{ steps.metadata.outputs.display_name }}" `
            -Description "${{ steps.metadata.outputs.description }}" `
            -ExecutionAlias "${{ steps.metadata.outputs.execution_alias }}"

      - name: Build Windows MSIX/MSIXBUNDLE artifacts
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        shell: pwsh
        run: |
          .\packaging\windows\scripts\build-msixbundle.ps1 `
            -OutputDir target\windows-msix\output `
            -PfxPath "${{ steps.certificate.outputs.pfx_path }}" `
            -CertificatePath "${{ steps.certificate.outputs.certificate_path }}" `
            -Version "${{ steps.metadata.outputs.release_version }}"

      - name: Upload x64 MSIX artifact
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: cnb-rs-v${{ steps.metadata.outputs.release_version }}-x86_64-pc-windows-msvc.msix
          path: target/windows-msix/output/cnb-rs-v${{ steps.metadata.outputs.release_version }}-x86_64-pc-windows-msvc.msix
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

      - name: Upload arm64 MSIX artifact
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: cnb-rs-v${{ steps.metadata.outputs.release_version }}-aarch64-pc-windows-msvc.msix
          path: target/windows-msix/output/cnb-rs-v${{ steps.metadata.outputs.release_version }}-aarch64-pc-windows-msvc.msix
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

      - name: Upload MSIX bundle artifact
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: cnb-rs-v${{ steps.metadata.outputs.release_version }}-windows-msvc.msixbundle
          path: target/windows-msix/output/cnb-rs-v${{ steps.metadata.outputs.release_version }}-windows-msvc.msixbundle
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

      - name: Upload Windows MSIX signing certificate artifact
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: cnb-rs-v${{ steps.metadata.outputs.release_version }}-windows-msvc-signing-cert.cer
          path: ${{ steps.certificate.outputs.certificate_path }}
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

  smoke-test-msix:
    name: Smoke test Windows MSIX/MSIXBUNDLE (${{ matrix.target }})
    needs: build-msix
    if: ${{ needs.build-msix.result == 'success' && needs.build-msix.outputs.msix_enabled == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download MSIX bundle artifact
        uses: actions/download-artifact@v7
        with:
          name: cnb-rs-v${{ needs.build-msix.outputs.release_version }}-windows-msvc.msixbundle
          path: target/windows-msix/download/bundle

      - name: Download MSIX signing certificate artifact
        uses: actions/download-artifact@v7
        with:
          name: cnb-rs-v${{ needs.build-msix.outputs.release_version }}-windows-msvc-signing-cert.cer
          path: target/windows-msix/download/cert

      - name: Smoke test MSIX install and uninstall
        shell: pwsh
        run: |
          $bundlePath = Get-ChildItem target\windows-msix\download\bundle\*.msixbundle | Select-Object -First 1 -ExpandProperty FullName
          $certificatePath = Get-ChildItem target\windows-msix\download\cert\*.cer | Select-Object -First 1 -ExpandProperty FullName

          .\packaging\windows\scripts\test-msixbundle.ps1 `
            -BundlePath $bundlePath `
            -CertificatePath $certificatePath `
            -ExpectedVersion "${{ needs.build-msix.outputs.msix_version }}"

  publish:
    name: Publish GitHub and CNB releases
    needs:
      - build
      - build-msix
      - smoke-test-msix
    if: ${{ github.event_name == 'push' && always() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CNB_API_ENDPOINT: https://api.cnb.cool
      CNB_WEB_ENDPOINT: https://cnb.cool
      CNB_REPO_SLUG: wwvo/cnb-rs/cnb-rs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate CNB upload secret
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail
          : "${CNB_TOKEN:?Missing GitHub secret CNB_TOKEN}"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: cnb-rs-*
          path: release-artifacts
          merge-multiple: true

      - name: Ensure at least one artifact is available
        run: |
          set -euo pipefail

          if ! find release-artifacts -maxdepth 1 -type f | grep -q .; then
            echo "No successful build artifacts were produced; skip release publishing." >&2
            exit 1
          fi

      - name: Generate release notes
        run: |
          set -euo pipefail
          git fetch --tags --force
          git cliff --latest --strip header -o LATEST_CHANGELOG.md

      - name: Stage installer scripts
        run: |
          set -euo pipefail

          release_tag="${GITHUB_REF_NAME}"
          cp scripts/install.sh "release-artifacts/cnb-rs-${release_tag}-install.sh"
          cp scripts/install.ps1 "release-artifacts/cnb-rs-${release_tag}-install.ps1"
          chmod 755 "release-artifacts/cnb-rs-${release_tag}-install.sh"

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.msi' -o -name '*.msix' -o -name '*.msixbundle' -o -name '*.deb' -o -name '*.rpm' -o -name '*.cer' -o -name 'cnb-rs-*-install.sh' -o -name 'cnb-rs-*-install.ps1' \) -printf '%P\n' | sort | xargs sha256sum > sha256sum.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          body_path: LATEST_CHANGELOG.md
          overwrite_files: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

      - name: Collect CNB attachment files
        id: attachments
        run: |
          set -euo pipefail

          files="$(find release-artifacts -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.msi' -o -name '*.msix' -o -name '*.msixbundle' -o -name '*.deb' -o -name '*.rpm' -o -name '*.cer' -o -name 'cnb-rs-*-install.sh' -o -name 'cnb-rs-*-install.ps1' -o -name 'sha256sum.txt' \) | sort | paste -sd, -)"
          : "${files:?No release artifacts found for CNB upload}"
          echo "files=${files}" >> "$GITHUB_OUTPUT"

      - name: Delete existing CNB release attachments
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          log_file="$(mktemp)"

          set +e
          docker run --rm \
            -e TZ=Asia/Shanghai \
            -e CNB_TOKEN="${CNB_TOKEN}" \
            -e CNB_API_ENDPOINT="${CNB_API_ENDPOINT}" \
            -e CNB_WEB_ENDPOINT="${CNB_WEB_ENDPOINT}" \
            -e CNB_REPO_SLUG="${CNB_REPO_SLUG}" \
            -e PLUGIN_TAG="${GITHUB_REF_NAME}" \
            -e PLUGIN_TYPE="DELETE" \
            -v "${PWD}:${PWD}" \
            -w "${PWD}" \
            cnbcool/attachments:latest 2>&1 | tee "${log_file}"
          status="${PIPESTATUS[0]}"
          set -e

          if [[ "${status}" -eq 0 ]]; then
            exit 0
          fi

          if grep -Eq "附件不存在|attachment.*not.*exist|attachments?.*not.*found" "${log_file}"; then
            echo "CNB release 当前没有附件，跳过删除"
            exit 0
          fi

          echo "删除 CNB release 附件失败" >&2
          exit "${status}"

      - name: Upload attachments to CNB Release
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          log_file="$(mktemp)"

          set +e
          docker run --rm \
            -e TZ=Asia/Shanghai \
            -e CNB_TOKEN="${CNB_TOKEN}" \
            -e CNB_API_ENDPOINT="${CNB_API_ENDPOINT}" \
            -e CNB_WEB_ENDPOINT="${CNB_WEB_ENDPOINT}" \
            -e CNB_REPO_SLUG="${CNB_REPO_SLUG}" \
            -e PLUGIN_TAG="${GITHUB_REF_NAME}" \
            -e PLUGIN_ATTACHMENTS="${{ steps.attachments.outputs.files }}" \
            -v "${PWD}:${PWD}" \
            -w "${PWD}" \
            cnbcool/attachments:latest >"${log_file}" 2>&1
          status=$?
          set -e

          grep -Ev '^##\[set-output ' "${log_file}" || true

          exit "${status}"

  update-package-repos:
    name: Update Homebrew and Scoop package repos
    needs:
      - publish
    if: ${{ needs.publish.result == 'success' && github.event_name == 'push' && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate CNB package repo secret
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail
          : "${CNB_TOKEN:?Missing GitHub secret CNB_TOKEN}"

      - name: Update package repositories
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_WEB_ENDPOINT: https://cnb.cool
        run: |
          set -euo pipefail
          python3 scripts/release/update_package_repos.py \
            --release-tag "${GITHUB_REF_NAME}" \
            --push

  report-build-failures:
    name: Report Partial Build Failures
    needs:
      - build
      - build-msix
      - smoke-test-msix
      - publish
    if: ${{ always() && (needs.build.result == 'failure' || needs.build-msix.result == 'failure' || needs.smoke-test-msix.result == 'failure') }}
    runs-on: ubuntu-latest

    steps:
      - name: Mark workflow as partial failure
        run: |
          echo "Release attachments were published from successful targets, but at least one required build or MSIX validation target failed." >&2
          exit 1
