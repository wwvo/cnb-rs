name: Release Assets

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            package_linux_native: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            archive_ext: zip
            setup_mingw: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip
          - os: ubuntu-latest
            target: aarch64-pc-windows-gnullvm
            archive_ext: zip
            setup_cross_toolchain: true
            experimental: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup MinGW
        if: matrix.setup_mingw
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain

      - name: Add MinGW to PATH
        if: matrix.setup_mingw
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install Linux native packaging dependencies
        if: matrix.package_linux_native
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm

      - name: Install cargo-deb
        if: matrix.package_linux_native
        shell: bash
        run: cargo install cargo-deb --locked

      - name: Install cargo-generate-rpm
        if: matrix.package_linux_native
        shell: bash
        run: cargo install cargo-generate-rpm --locked

      - name: Setup Windows ARM64 gnullvm toolchain
        if: matrix.setup_cross_toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.setup_cross_toolchain }}" == "true" ]]; then
            cargo build --release --locked --target "${{ matrix.target }}"
          elif [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${GITHUB_REF_NAME}"
          asset_base="cnb-rs-${release_tag}-${{ matrix.target }}"
          asset_dir="${asset_base}"
          package_files=()

          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            binary_name="cnb-rs.exe"
          else
            binary_name="cnb-rs"
          fi

          mkdir -p "${asset_dir}"
          cp "target/${{ matrix.target }}/release/${binary_name}" "${asset_dir}/"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a -tzip -mx=9 "${asset_base}.zip" "${asset_dir}"
            asset_file="${asset_base}.zip"
          else
            tar cf - "${asset_dir}" | gzip -9 > "${asset_base}.tar.gz"
            asset_file="${asset_base}.tar.gz"
          fi

          package_files+=("${asset_file}")

          if [[ "${{ matrix.package_linux_native }}" == "true" ]]; then
            bash packaging/linux/scripts/generate-completions.sh --target "${{ matrix.target }}"

            cargo deb --no-build --no-strip --target "${{ matrix.target }}"
            deb_file="$(find "target/${{ matrix.target }}/debian" -maxdepth 1 -type f -name '*.deb' | head -n 1)"
            : "${deb_file:?failed to locate generated deb file}"
            cp "${deb_file}" .
            package_files+=("$(basename "${deb_file}")")

            cargo generate-rpm
            rpm_file="$(find target/generate-rpm -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
            : "${rpm_file:?failed to locate generated rpm file}"
            cp "${rpm_file}" .
            package_files+=("$(basename "${rpm_file}")")
          fi

          printf 'asset_files<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' "${package_files[@]}" >> "$GITHUB_OUTPUT"
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.asset_files }}
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

  publish:
    name: Publish GitHub and CNB releases
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CNB_API_ENDPOINT: https://api.cnb.cool
      CNB_WEB_ENDPOINT: https://cnb.cool
      CNB_REPO_SLUG: wwvo/cnb-rs/cnb-rs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate CNB upload secret
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail
          : "${CNB_TOKEN:?Missing GitHub secret CNB_TOKEN}"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          set -euo pipefail
          git fetch --tags --force
          git cliff --latest --strip header -o LATEST_CHANGELOG.md

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' \) -printf '%P\n' | sort | xargs sha256sum > sha256sum.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          body_path: LATEST_CHANGELOG.md
          overwrite_files: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

      - name: Collect CNB attachment files
        id: attachments
        run: |
          set -euo pipefail

          files="$(find release-artifacts -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' -o -name 'sha256sum.txt' \) | sort | paste -sd, -)"
          : "${files:?No release artifacts found for CNB upload}"
          echo "files=${files}" >> "$GITHUB_OUTPUT"

      - name: Delete existing CNB release attachments
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          log_file="$(mktemp)"

          set +e
          docker run --rm \
            -e TZ=Asia/Shanghai \
            -e CNB_TOKEN="${CNB_TOKEN}" \
            -e CNB_API_ENDPOINT="${CNB_API_ENDPOINT}" \
            -e CNB_WEB_ENDPOINT="${CNB_WEB_ENDPOINT}" \
            -e CNB_REPO_SLUG="${CNB_REPO_SLUG}" \
            -e PLUGIN_TAG="${GITHUB_REF_NAME}" \
            -e PLUGIN_TYPE="DELETE" \
            -v "${PWD}:${PWD}" \
            -w "${PWD}" \
            cnbcool/attachments:latest 2>&1 | tee "${log_file}"
          status="${PIPESTATUS[0]}"
          set -e

          if [[ "${status}" -eq 0 ]]; then
            exit 0
          fi

          if grep -Eq "附件不存在|attachment.*not.*exist|attachments?.*not.*found" "${log_file}"; then
            echo "CNB release 当前没有附件，跳过删除"
            exit 0
          fi

          echo "删除 CNB release 附件失败" >&2
          exit "${status}"

      - name: Upload attachments to CNB Release
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          log_file="$(mktemp)"

          set +e
          docker run --rm \
            -e TZ=Asia/Shanghai \
            -e CNB_TOKEN="${CNB_TOKEN}" \
            -e CNB_API_ENDPOINT="${CNB_API_ENDPOINT}" \
            -e CNB_WEB_ENDPOINT="${CNB_WEB_ENDPOINT}" \
            -e CNB_REPO_SLUG="${CNB_REPO_SLUG}" \
            -e PLUGIN_TAG="${GITHUB_REF_NAME}" \
            -e PLUGIN_ATTACHMENTS="${{ steps.attachments.outputs.files }}" \
            -v "${PWD}:${PWD}" \
            -w "${PWD}" \
            cnbcool/attachments:latest >"${log_file}" 2>&1
          status=$?
          set -e

          grep -Ev '^##\[set-output ' "${log_file}" || true

          exit "${status}"
