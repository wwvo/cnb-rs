name: Release Assets

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            package_linux_deb: true
            package_linux_rpm: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: true
            package_linux_deb: true
            package_linux_rpm: true
            linux_deb_arch: arm64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            archive_ext: zip
            setup_mingw: true
            package_windows_msi: true
            windows_msi_arch: x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            package_windows_msi: true
            windows_msi_arch: x64
            msvc_dev_cmd_arch: amd64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            package_windows_msi: true
            windows_msi_arch: arm64
            msvc_dev_cmd_arch: amd64_arm64
          - os: ubuntu-latest
            target: aarch64-pc-windows-gnullvm
            archive_ext: zip
            setup_cross_toolchain: true
            experimental: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup MinGW
        if: matrix.setup_mingw
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain

      - name: Add MinGW to PATH
        if: matrix.setup_mingw
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install Linux native packaging dependencies
        if: matrix.package_linux_deb || matrix.package_linux_rpm
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm

          if [[ -n "${{ matrix.linux_deb_arch }}" ]]; then
            # crossbuild-essential-arm64 is an Architecture: all metapackage.
            # Installing it does not require enabling arm64 apt indexes on the runner,
            # which currently causes 404s against Ubuntu security mirrors.
            sudo apt-get install -y "crossbuild-essential-${{ matrix.linux_deb_arch }}"
          fi

      - name: Install cargo-deb
        if: matrix.package_linux_deb
        shell: bash
        run: cargo install cargo-deb --locked

      - name: Install cargo-generate-rpm
        if: matrix.package_linux_rpm
        shell: bash
        run: cargo install cargo-generate-rpm --locked

      - name: Setup Windows ARM64 gnullvm toolchain
        if: matrix.setup_cross_toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Setup .NET SDK
        if: matrix.package_windows_msi
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSVC developer command prompt
        if: endsWith(matrix.target, '-pc-windows-msvc')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_dev_cmd_arch }}

      - name: Build binaries (Windows MSVC)
        if: endsWith(matrix.target, '-pc-windows-msvc')
        shell: pwsh
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Build binaries
        if: ${{ !endsWith(matrix.target, '-pc-windows-msvc') }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.setup_cross_toolchain }}" == "true" ]]; then
            cargo build --release --locked --target "${{ matrix.target }}"
          elif [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Build Windows MSI package
        if: matrix.package_windows_msi
        shell: pwsh
        run: |
          .\packaging\windows\scripts\build-msi.ps1 `
            -Target ${{ matrix.target }} `
            -Architecture ${{ matrix.windows_msi_arch }} `
            -OutputDir target\windows-msi

      - name: Build Linux packaging helper binary
        if: matrix.package_linux_deb || matrix.package_linux_rpm
        shell: bash
        run: |
          set -euo pipefail

          host_target="$(rustc -vV | sed -n 's/^host: //p')"
          if [[ "${{ matrix.target }}" == "${host_target}" ]]; then
            exit 0
          fi

          cargo build --release --locked --bin cnb-rs --target "${host_target}" --target-dir target/packaging-host

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${GITHUB_REF_NAME}"
          asset_base="cnb-rs-${release_tag}-${{ matrix.target }}"
          asset_dir="${asset_base}"
          package_files=()

          if [[ "${{ matrix.target }}" == *-windows-* ]]; then
            binary_name="cnb-rs.exe"
          else
            binary_name="cnb-rs"
          fi

          mkdir -p "${asset_dir}"
          cp "target/${{ matrix.target }}/release/${binary_name}" "${asset_dir}/"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a -tzip -mx=9 "${asset_base}.zip" "${asset_dir}"
            asset_file="${asset_base}.zip"
          else
            tar cf - "${asset_dir}" | gzip -9 > "${asset_base}.tar.gz"
            asset_file="${asset_base}.tar.gz"
          fi

          package_files+=("${asset_file}")

          if [[ "${{ matrix.package_windows_msi }}" == "true" ]]; then
            msi_file="target/windows-msi/${asset_base}.msi"
            : "${msi_file:?failed to determine expected MSI path}"
            test -f "${msi_file}"
            cp "${msi_file}" .
            package_files+=("$(basename "${msi_file}")")
          fi

          if [[ "${{ matrix.package_linux_deb }}" == "true" || "${{ matrix.package_linux_rpm }}" == "true" ]]; then
            host_target="$(rustc -vV | sed -n 's/^host: //p')"
            completion_binary_path="target/${{ matrix.target }}/release/cnb-rs"
            if [[ "${{ matrix.target }}" != "${host_target}" ]]; then
              completion_binary_path="target/packaging-host/${host_target}/release/cnb-rs"
            fi

            bash packaging/linux/scripts/generate-completions.sh --binary-path "${completion_binary_path}"
          fi

          if [[ "${{ matrix.package_linux_deb }}" == "true" ]]; then
            cargo deb --no-build --no-strip --target "${{ matrix.target }}"
            deb_file=""
            for candidate_dir in "target/${{ matrix.target }}/debian" "target/debian"; do
              if [[ -d "${candidate_dir}" ]]; then
                deb_file="$(find "${candidate_dir}" -maxdepth 1 -type f -name '*.deb' | head -n 1)"
              fi
              if [[ -n "${deb_file}" ]]; then
                break
              fi
            done
            : "${deb_file:?failed to locate generated deb file}"
            cp "${deb_file}" .
            package_files+=("$(basename "${deb_file}")")
          fi

          if [[ "${{ matrix.package_linux_rpm }}" == "true" ]]; then
            cargo generate-rpm --target "${{ matrix.target }}"
            rpm_file=""
            for candidate_dir in "target/${{ matrix.target }}/generate-rpm" "target/generate-rpm"; do
              if [[ -d "${candidate_dir}" ]]; then
                rpm_file="$(find "${candidate_dir}" -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
              fi
              if [[ -n "${rpm_file}" ]]; then
                break
              fi
            done
            : "${rpm_file:?failed to locate generated rpm file}"
            cp "${rpm_file}" .
            package_files+=("$(basename "${rpm_file}")")
          fi

          printf 'asset_files<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' "${package_files[@]}" >> "$GITHUB_OUTPUT"
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Validate Linux native packages
        if: matrix.package_linux_deb || matrix.package_linux_rpm
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)
              expected_rpm_arch="x86_64"
              expected_deb_arch="amd64"
              ;;
            aarch64-unknown-linux-gnu)
              expected_rpm_arch="aarch64"
              expected_deb_arch="arm64"
              ;;
            *)
              echo "Unsupported Linux packaging validation target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

          expected_paths=(
            "/usr/bin/cnb-rs"
            "/usr/share/bash-completion/completions/cnb-rs"
            "/usr/share/zsh/vendor-completions/_cnb-rs"
            "/usr/share/fish/vendor_completions.d/cnb-rs.fish"
          )

          if [[ "${{ matrix.package_linux_deb }}" == "true" ]]; then
            deb_file="$(find . -maxdepth 1 -type f -name '*.deb' | head -n 1)"
            : "${deb_file:?failed to locate copied deb file for validation}"

            actual_deb_arch="$(dpkg-deb -f "${deb_file}" Architecture)"
            [[ "${actual_deb_arch}" == "${expected_deb_arch}" ]]

            dpkg-deb --contents "${deb_file}" | awk '{print $NF}' > deb-contents.txt
            for expected_path in "${expected_paths[@]}"; do
              grep -Fx ".${expected_path}" deb-contents.txt > /dev/null
            done
          fi

          if [[ "${{ matrix.package_linux_rpm }}" == "true" ]]; then
            rpm_file="$(find . -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
            : "${rpm_file:?failed to locate copied rpm file for validation}"

            actual_rpm_arch="$(rpm -qp --qf '%{ARCH}\n' "${rpm_file}")"
            [[ "${actual_rpm_arch}" == "${expected_rpm_arch}" ]]

            rpm -qpl "${rpm_file}" > rpm-contents.txt
            for expected_path in "${expected_paths[@]}"; do
              grep -Fx "${expected_path}" rpm-contents.txt > /dev/null
            done
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.asset_files }}
          retention-days: 7
          if-no-files-found: error
          compression-level: 0

  publish:
    name: Publish GitHub and CNB releases
    needs: build
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CNB_API_ENDPOINT: https://api.cnb.cool
      CNB_WEB_ENDPOINT: https://cnb.cool
      CNB_REPO_SLUG: wwvo/cnb-rs/cnb-rs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate CNB upload secret
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail
          : "${CNB_TOKEN:?Missing GitHub secret CNB_TOKEN}"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Ensure at least one artifact is available
        run: |
          set -euo pipefail

          if ! find release-artifacts -maxdepth 1 -type f | grep -q .; then
            echo "No successful build artifacts were produced; skip release publishing." >&2
            exit 1
          fi

      - name: Generate release notes
        run: |
          set -euo pipefail
          git fetch --tags --force
          git cliff --latest --strip header -o LATEST_CHANGELOG.md

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' \) -printf '%P\n' | sort | xargs sha256sum > sha256sum.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          body_path: LATEST_CHANGELOG.md
          overwrite_files: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

      - name: Collect CNB attachment files
        id: attachments
        run: |
          set -euo pipefail

          files="$(find release-artifacts -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name 'sha256sum.txt' \) | sort | paste -sd, -)"
          : "${files:?No release artifacts found for CNB upload}"
          echo "files=${files}" >> "$GITHUB_OUTPUT"

      - name: Delete existing CNB release attachments
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          log_file="$(mktemp)"

          set +e
          docker run --rm \
            -e TZ=Asia/Shanghai \
            -e CNB_TOKEN="${CNB_TOKEN}" \
            -e CNB_API_ENDPOINT="${CNB_API_ENDPOINT}" \
            -e CNB_WEB_ENDPOINT="${CNB_WEB_ENDPOINT}" \
            -e CNB_REPO_SLUG="${CNB_REPO_SLUG}" \
            -e PLUGIN_TAG="${GITHUB_REF_NAME}" \
            -e PLUGIN_TYPE="DELETE" \
            -v "${PWD}:${PWD}" \
            -w "${PWD}" \
            cnbcool/attachments:latest 2>&1 | tee "${log_file}"
          status="${PIPESTATUS[0]}"
          set -e

          if [[ "${status}" -eq 0 ]]; then
            exit 0
          fi

          if grep -Eq "附件不存在|attachment.*not.*exist|attachments?.*not.*found" "${log_file}"; then
            echo "CNB release 当前没有附件，跳过删除"
            exit 0
          fi

          echo "删除 CNB release 附件失败" >&2
          exit "${status}"

      - name: Upload attachments to CNB Release
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          log_file="$(mktemp)"

          set +e
          docker run --rm \
            -e TZ=Asia/Shanghai \
            -e CNB_TOKEN="${CNB_TOKEN}" \
            -e CNB_API_ENDPOINT="${CNB_API_ENDPOINT}" \
            -e CNB_WEB_ENDPOINT="${CNB_WEB_ENDPOINT}" \
            -e CNB_REPO_SLUG="${CNB_REPO_SLUG}" \
            -e PLUGIN_TAG="${GITHUB_REF_NAME}" \
            -e PLUGIN_ATTACHMENTS="${{ steps.attachments.outputs.files }}" \
            -v "${PWD}:${PWD}" \
            -w "${PWD}" \
            cnbcool/attachments:latest >"${log_file}" 2>&1
          status=$?
          set -e

          grep -Ev '^##\[set-output ' "${log_file}" || true

          exit "${status}"

  report-build-failures:
    name: Report Partial Build Failures
    needs:
      - build
      - publish
    if: ${{ always() && needs.build.result == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Mark workflow as partial failure
        run: |
          echo "Release attachments were published from successful targets, but at least one required build target failed." >&2
          exit 1
