name: Windows MSI Validation

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-msi.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/**"
      - "packaging/windows/**"
      - "README.md"
      - "LICENSE"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-msi:
    name: Build ${{ matrix.target }} MSI
    runs-on: ${{ matrix.build_runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            build_runner: windows-latest
            smoke_runner: windows-latest
            installer_arch: x64
            artifact_name: cnb-rs-msi-x86_64-pc-windows-msvc
            msvc_dev_cmd_arch: amd64
          - target: x86_64-pc-windows-gnu
            build_runner: windows-latest
            smoke_runner: windows-latest
            installer_arch: x64
            artifact_name: cnb-rs-msi-x86_64-pc-windows-gnu
            setup_mingw: true
          - target: aarch64-pc-windows-msvc
            build_runner: windows-latest
            smoke_runner: windows-11-arm
            installer_arch: arm64
            artifact_name: cnb-rs-msi-aarch64-pc-windows-msvc
            msvc_dev_cmd_arch: amd64_arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msi-${{ matrix.target }}

      - name: Setup MinGW
        if: matrix.setup_mingw
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain

      - name: Add MinGW to PATH
        if: matrix.setup_mingw
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSVC developer command prompt
        if: endsWith(matrix.target, '-pc-windows-msvc')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_dev_cmd_arch }}

      - name: Build release binary (Windows MSVC)
        if: endsWith(matrix.target, '-pc-windows-msvc')
        shell: pwsh
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build release binary (Windows GNU)
        if: matrix.setup_mingw
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Build MSI package
        shell: pwsh
        run: |
          .\packaging\windows\scripts\build-msi.ps1 `
            -Target ${{ matrix.target }} `
            -Architecture ${{ matrix.installer_arch }} `
            -OutputDir target\windows-msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/windows-msi/*.msi
          if-no-files-found: error
          retention-days: 7

  smoke-test-msi:
    name: Smoke test ${{ matrix.target }} MSI
    needs: build-msi
    runs-on: ${{ matrix.smoke_runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            smoke_runner: windows-latest
            artifact_name: cnb-rs-msi-x86_64-pc-windows-msvc
          - target: x86_64-pc-windows-gnu
            smoke_runner: windows-latest
            artifact_name: cnb-rs-msi-x86_64-pc-windows-gnu
          - target: aarch64-pc-windows-msvc
            smoke_runner: windows-11-arm
            artifact_name: cnb-rs-msi-aarch64-pc-windows-msvc

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: target/windows-msi

      - name: Smoke test MSI install and uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          function Normalize-PathEntry {
            param(
              [Parameter(Mandatory = $true)]
              [string]$PathEntry
            )

            return $PathEntry.Trim().TrimEnd('\').ToLowerInvariant()
          }

          function Get-MinimalProcessPath {
            param(
              [Parameter(Mandatory = $true)]
              [string]$InstallDir
            )

            $entries = @(
              $InstallDir,
              (Join-Path $env:SystemRoot "System32"),
              $env:SystemRoot,
              (Join-Path $env:SystemRoot "System32\Wbem"),
              (Join-Path $env:SystemRoot "System32\WindowsPowerShell\v1.0")
            ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

            return ($entries -join ';')
          }

          $msiPath = Get-ChildItem target\windows-msi\*.msi | Select-Object -First 1 -ExpandProperty FullName
          if (-not $msiPath) {
            throw "Failed to locate generated MSI package"
          }

          $installDir = Join-Path ${env:ProgramFiles} "cnb-rs"
          $installedExe = Join-Path $installDir "cnb-rs.exe"
          $licenseFile = Join-Path $installDir "LICENSE"
          $readmeFile = Join-Path $installDir "README.md"
          $logDir = Join-Path $PWD "target\windows-msi\logs"
          $installLog = Join-Path $logDir "install.log"
          $uninstallLog = Join-Path $logDir "uninstall.log"
          $installed = $false
          $uninstalled = $false

          New-Item -ItemType Directory -Force -Path $logDir | Out-Null

          try {
            $install = Start-Process msiexec.exe -ArgumentList @(
              "/i", $msiPath, "/qn", "/norestart", "/L*V", $installLog
            ) -Wait -PassThru

            if ($install.ExitCode -ne 0) {
              throw "MSI install failed with exit code $($install.ExitCode)"
            }

            $installed = $true

            if (-not (Test-Path $installDir)) {
              throw "Install directory not found: $installDir"
            }

            foreach ($path in @($installedExe, $licenseFile, $readmeFile)) {
              if (-not (Test-Path $path)) {
                throw "Expected installed file not found: $path"
              }
            }

            $normalizedInstallDir = Normalize-PathEntry -PathEntry $installDir
            $machinePathEntries = [Environment]::GetEnvironmentVariable("Path", "Machine") -split ';' |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              ForEach-Object { Normalize-PathEntry -PathEntry $_ }
            if ($machinePathEntries -notcontains $normalizedInstallDir) {
              throw "Install directory was not appended to machine PATH"
            }

            $previousProcessPath = $env:Path
            try {
              $env:Path = Get-MinimalProcessPath -InstallDir $installDir
              & $installedExe --version
            }
            finally {
              $env:Path = $previousProcessPath
            }

            $uninstall = Start-Process msiexec.exe -ArgumentList @(
              "/x", $msiPath, "/qn", "/norestart", "/L*V", $uninstallLog
            ) -Wait -PassThru

            if ($uninstall.ExitCode -ne 0) {
              throw "MSI uninstall failed with exit code $($uninstall.ExitCode)"
            }

            $uninstalled = $true

            if (Test-Path $installedExe) {
              throw "Installed executable still exists after uninstall: $installedExe"
            }

            $machinePathEntriesAfterUninstall = [Environment]::GetEnvironmentVariable("Path", "Machine") -split ';' |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              ForEach-Object { Normalize-PathEntry -PathEntry $_ }
            if ($machinePathEntriesAfterUninstall -contains $normalizedInstallDir) {
              throw "Install directory still present in machine PATH after uninstall"
            }
          }
          catch {
            if (Test-Path $installLog) {
              Write-Host "==== MSI install log ===="
              Get-Content $installLog
            }

            if (Test-Path $uninstallLog) {
              Write-Host "==== MSI uninstall log ===="
              Get-Content $uninstallLog
            }

            throw
          }
          finally {
            if ($installed -and -not $uninstalled) {
              $null = Start-Process msiexec.exe -ArgumentList @(
                "/x", $msiPath, "/qn", "/norestart"
              ) -Wait -PassThru -ErrorAction SilentlyContinue
            }
          }
