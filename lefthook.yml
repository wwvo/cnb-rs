glob_matcher: doublestar

pre-commit:
  commands:
    rustfmt:
      glob:
        - "Cargo.toml"
        - "Cargo.lock"
        - "build.rs"
        - "rust-toolchain.toml"
        - "rustfmt.toml"
        - ".cargo/**/*"
        - "src/**/*"
        - "crates/**/*"
      run: cargo fmt --all --check
      fail_text: "Rust 格式检查失败。请先执行 `cargo fmt --all`，再重新提交。"

pre-push:
  commands:
    rust-gate:
      glob:
        - "Cargo.toml"
        - "Cargo.lock"
        - "build.rs"
        - "rust-toolchain.toml"
        - "rustfmt.toml"
        - ".cargo/**/*"
        - "src/**/*"
        - "crates/**/*"
        - ".cnb/scripts/ci-check.sh"
        - ".cnb/workflows/ci-check.yml"
      run: |
        set -e
        cargo fmt --all --check
        # 不显式 --target：使用当前 rustc 默认 host triple（跨平台）。
        # 若需交叉检查，可设置环境变量 CARGO_BUILD_TARGET（Cargo 会作为默认目标）。
        cargo clippy --workspace --all-targets -- -W clippy::all -W clippy::pedantic
        cargo test --workspace
      fail_text: "Pre-push 校验失败。请修复问题后再推送，或手动执行 `lefthook run pre-push --force` 复查。"
