# cargo-deny: https://embarkstudios.github.io/cargo-deny/
# Run locally: `cargo deny check` (install: `cargo install cargo-deny --locked`).
#
# Advisory 数据库
# - 默认与 Cargo 一致：缓存在 $CARGO_HOME/advisory-dbs（见下方 db-path）。
# - 每次执行 `cargo deny check`（未使用 `--offline` / `--disable-fetch`）时会从 db-urls 拉取或更新；
#   CI 与本地常规检查因此始终对照 RustSec 最新提交。
# - 仅在使用 `--offline` 或 `--disable-fetch` 时才会校验数据库「新鲜度」；
#   此时受 maximum-db-staleness 约束（默认 90 天，与 cargo-audit 一致）。

[graph]
targets = []
all-features = false

[advisories]
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
# 已 yanked 的版本在 lockfile 中会导致检查失败，避免继续依赖被撤包版本
yanked = "deny"
# 未在依赖图中出现的 ignore 项会告警，防止遗留无效条目
unused-ignored-advisory = "warn"
# 严于默认 `workspace`：任意 crate 的 unsound 通报均失败
unsound = "all"
# unmaintained 默认即为 `all`（最严），此处不显式写出以免与上游默认语义漂移

[licenses]
version = 2
# allow 列表中未被任何 crate 使用的 SPDX 会告警，便于收紧白名单
unused-allowed-license = "warn"
allow = [
  "Apache-2.0",
  "MIT",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "CC0-1.0",
  "Unlicense",
  "MPL-2.0",
  "BSL-1.0",
  # `webpki-root-certs` 携带 Mozilla/CCADB 根证书数据，因此需要放行这个数据许可证
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
# 下列版本为传递依赖中并存的多版本；已逐项 skip，避免刷屏，仍保留 multiple-versions=warn 以捕获「新出现的」重复 crate
# 若某 skip 项不再出现在依赖图中，cargo-deny 会提示清理本列表
# 未使用 `wildcards = "deny"`：cargo-deny 将 `workspace = true` 也视为通配，与本仓库 workspace 依赖模式冲突
skip = [
  { crate = "getrandom@0.2.17", reason = "dirs/redox 链路" },
  { crate = "getrandom@0.3.4", reason = "aws-lc-rs/cc 构建链" },
  { crate = "thiserror@1.0.69", reason = "jni/rustls-platform-verifier" },
  { crate = "thiserror@2.0.18", reason = "本仓库与生态主路径" },
  { crate = "thiserror-impl@1.0.69", reason = "配合 thiserror 1.x" },
  { crate = "thiserror-impl@2.0.18", reason = "配合 thiserror 2.x" },
  { crate = "windows-sys@0.45.0", reason = "jni 等传递依赖" },
  { crate = "windows-sys@0.52.0", reason = "rpassword/rtoolbox 等" },
  { crate = "windows-sys@0.59.0", reason = "rustyline/fd-lock 等" },
  { crate = "windows-sys@0.60.2", reason = "rustyline" },
  { crate = "windows-sys@0.61.2", reason = "clap/dirs/crossterm 等" },
  { crate = "windows-targets@0.42.2", reason = "windows-sys 0.45 线" },
  { crate = "windows-targets@0.52.6", reason = "windows-sys 0.52/0.59 线" },
  { crate = "windows-targets@0.53.5", reason = "windows-sys 0.60 线" },
  { crate = "windows_aarch64_gnullvm@0.42.2", reason = "windows-targets 多版本" },
  { crate = "windows_aarch64_gnullvm@0.52.6", reason = "windows-targets 多版本" },
  { crate = "windows_aarch64_gnullvm@0.53.1", reason = "windows-targets 多版本" },
  { crate = "windows_aarch64_msvc@0.42.2", reason = "windows-targets 多版本" },
  { crate = "windows_aarch64_msvc@0.52.6", reason = "windows-targets 多版本" },
  { crate = "windows_aarch64_msvc@0.53.1", reason = "windows-targets 多版本" },
  { crate = "windows_i686_gnu@0.42.2", reason = "windows-targets 多版本" },
  { crate = "windows_i686_gnu@0.52.6", reason = "windows-targets 多版本" },
  { crate = "windows_i686_gnu@0.53.1", reason = "windows-targets 多版本" },
  { crate = "windows_i686_gnullvm@0.52.6", reason = "windows-targets 多版本" },
  { crate = "windows_i686_gnullvm@0.53.1", reason = "windows-targets 多版本" },
  { crate = "windows_i686_msvc@0.42.2", reason = "windows-targets 多版本" },
  { crate = "windows_i686_msvc@0.52.6", reason = "windows-targets 多版本" },
  { crate = "windows_i686_msvc@0.53.1", reason = "windows-targets 多版本" },
  { crate = "windows_x86_64_gnu@0.42.2", reason = "windows-targets 多版本" },
  { crate = "windows_x86_64_gnu@0.52.6", reason = "windows-targets 多版本" },
  { crate = "windows_x86_64_gnu@0.53.1", reason = "windows-targets 多版本" },
  { crate = "windows_x86_64_gnullvm@0.42.2", reason = "windows-targets 多版本" },
  { crate = "windows_x86_64_gnullvm@0.52.6", reason = "windows-targets 多版本" },
  { crate = "windows_x86_64_gnullvm@0.53.1", reason = "windows-targets 多版本" },
  { crate = "windows_x86_64_msvc@0.42.2", reason = "windows-targets 多版本" },
  { crate = "windows_x86_64_msvc@0.52.6", reason = "windows-targets 多版本" },
  { crate = "windows_x86_64_msvc@0.53.1", reason = "windows-targets 多版本" },
  { crate = "winnow@0.7.15", reason = "toml 0.9" },
  { crate = "winnow@1.0.0", reason = "toml_parser / toml 0.9" },
]
# wildcards = "deny"

[sources]
unknown-registry = "deny"
# 禁止未声明的 git 源，降低供应链风险（仅 crates.io / 已配置源）
unknown-git = "deny"
