branch:
  - buttons:
      - name: 准备 release PR
        description: 自动 bump 版本、更新 CHANGELOG 并创建 release PR
        event: web_trigger_release-prepare
      - name: 运行代码检查
        description: 执行 rustfmt、cargo check、clippy 与 cargo test
        event: web_trigger_ci-check
      - name: 部署文档站点
        description: 部署文档站点
        event: web_trigger_deploy-docs
      - name: 构建 Rust CI 镜像
        description: 预热 Linux CI 依赖并更新 rust-ci 镜像
        event: web_trigger_build-image
      - name: 生成 release issue 候选清单
        description: 按版本标签生成发布后流水线收口候选 checklist
        event: web_trigger_release-issue-checklist
        inputs:
          RELEASE_TAG:
            type: input
            name: 发布版本
            description: 已成功发布的稳定版 tag，例如 v0.4.6
            placeholder: 请输入稳定版 tag，例如 v0.4.6
            required: true
          NEXT_TARGET_TAG:
            type: input
            name: 延后版本
            description: 可选。未赶上当前版本时，建议迁移到的下一个 target 标签，例如 v0.4.7
            placeholder: 可选，例如 v0.4.7
            required: false
