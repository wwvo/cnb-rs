x-build-image-check-job: &build-image-check-job
  - name: build-rust-ci-image-check
    runner:
      cpus: 4
    ifModify:
      - ".cnb/docker/rust-ci.Dockerfile"
      - "Cargo.lock"
    services:
      - docker
    stages:
      - name: 校验镜像构建
        script: bash .cnb/scripts/build-image.sh build

x-build-image-publish-job: &build-image-publish-job
  - name: build-rust-ci-image
    runner:
      cpus: 4
    ifModify:
      - ".cnb/docker/rust-ci.Dockerfile"
      - "Cargo.lock"
    services:
      - docker
    stages:
      - name: 等待代码检查通过
        type: cnb:await
        options:
          key: ci-check-ready
      - name: 构建镜像
        script: bash .cnb/scripts/build-image.sh build
      - name: 推送镜像
        script: bash .cnb/scripts/build-image.sh push

main:
  push: *build-image-publish-job
  pull_request: *build-image-check-job

'**':
  web_trigger_build-image: *build-image-publish-job
