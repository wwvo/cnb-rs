x-pre-release-check-job: &pre-release-check-job
  - name: pre-release-check
    runner:
      cpus: 4
    stages:
      - name: 发版前检查
        image: docker.cnb.cool/wwvo/cnb-rs/cnb-rs:rust-ci
        script: bash .cnb/scripts/pre-release-check.sh
      - name: 发版前检查通过
        type: cnb:resolve
        options:
          key: pre-release-check-ready

'v*':
  tag_push: *pre-release-check-job
