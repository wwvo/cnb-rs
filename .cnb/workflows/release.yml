x-release-job: &release-job
  - name: create-release-and-sync-github
    runner:
      cpus: 2
    stages:
      - name: 等待发版前检查
        type: cnb:await
        options:
          key: pre-release-check-ready
      - name: 生成 CHANGELOG
        image: docker.cnb.cool/wwvo/cnb-cli/cnb:rust-ci
        script: bash .cnb/scripts/generate-changelog.sh
      - name: 创建 CNB Release
        type: git:release
        options:
          title: $CNB_BRANCH
          descriptionFromFile: LATEST_CHANGELOG.md
          latest: true
          overlying: true
      - name: 同步当前 tag 到 GitHub
        image: tencentcom/git-sync
        imports:
          - https://cnb.cool/prevailna/secrets/-/blob/main/github-sync/cnb-rs.yml
        settings:
          target_url: ${GITHUB_SYNC_TARGET_URL}
          auth_type: https
          username: ${GITHUB_SYNC_USERNAME}
          password: ${GITHUB_SYNC_TOKEN}
          branch: ${CNB_BRANCH}
          push_tags: true

'v*':
  tag_push: *release-job
